apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateless-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stateless-web
  template:
    metadata:
      labels:
        app: stateless-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.1-alpine
          ports:
            - containerPort: 80