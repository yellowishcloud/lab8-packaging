apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/yellowishcloud/lab8-packaging.git
    targetRevision: main
    path: lab9/kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: kustomize-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true